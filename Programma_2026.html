<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Πρόγραμμα 2026">
<meta name="theme-color" content="#0f1117">
<title>Πρόγραμμα Εργασίας 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f1117;
  --surface: #1a1d27;
  --surface2: #22263a;
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.15);
  --text: #f0f1f5;
  --text2: #8b8fa8;
  --text3: #5a5e72;
  --green: #22c55e;
  --green-dim: rgba(34,197,94,0.12);
  --amber: #f59e0b;
  --amber-dim: rgba(245,158,11,0.12);
  --blue: #3b82f6;
  --blue-dim: rgba(59,130,246,0.12);
  --red: #ef4444;
  --radius: 14px;
  --radius-sm: 8px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:100%}
body{
  font-family:'DM Sans',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100%;
  max-width:480px;
  margin:0 auto;
  padding-bottom:80px;
}

/* HEADER */
.header{
  padding:env(safe-area-inset-top, 16px) 20px 16px;
  padding-top:max(env(safe-area-inset-top,0px), 20px);
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:100;
  background:var(--bg);
  backdrop-filter:blur(20px);
}
.header-left h1{font-size:17px;font-weight:600;letter-spacing:-0.3px}
.header-left p{font-size:12px;color:var(--text2);margin-top:1px}
.wage-pill{
  display:flex;align-items:center;gap:6px;
  background:var(--surface);border:1px solid var(--border2);
  border-radius:20px;padding:6px 12px;
}
.wage-pill label{font-size:11px;color:var(--text2);font-weight:500}
.wage-pill input{
  width:52px;background:none;border:none;outline:none;
  font-family:'DM Mono',monospace;font-size:14px;font-weight:500;
  color:var(--green);text-align:right;
}

/* MONTH NAV */
.month-nav{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 20px;
  position:sticky;top:61px;z-index:99;
  background:var(--bg);
  border-bottom:1px solid var(--border);
}
.nav-btn{
  width:36px;height:36px;border-radius:50%;
  background:var(--surface);border:1px solid var(--border2);
  color:var(--text);font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.15s;
}
.nav-btn:active{transform:scale(0.92);background:var(--surface2)}
.month-label{font-size:16px;font-weight:600;letter-spacing:-0.3px}

/* SUMMARY CARDS */
.summary{
  display:grid;grid-template-columns:1fr 1fr;gap:10px;
  padding:14px 20px 0;
}
.stat-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:14px;
}
.stat-card.green{border-color:rgba(34,197,94,0.25);background:var(--green-dim)}
.stat-card .label{font-size:11px;color:var(--text2);font-weight:500;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px}
.stat-card .value{font-size:24px;font-weight:600;letter-spacing:-0.5px;font-family:'DM Mono',monospace}
.stat-card.green .value{color:var(--green)}
.stat-card .sub{font-size:11px;color:var(--text3);margin-top:3px}

/* DAYS */
.days{padding:14px 20px 0}
.day-item{
  display:flex;align-items:center;gap:12px;
  padding:11px 14px;border-radius:var(--radius-sm);
  border:1px solid var(--border);
  background:var(--surface);
  margin-bottom:6px;cursor:pointer;
  transition:all 0.12s;
  position:relative;overflow:hidden;
}
.day-item:active{transform:scale(0.98)}
.day-item.weekend{background:transparent;border-color:rgba(255,255,255,0.04)}
.day-item.holiday{border-left:3px solid var(--amber)}
.day-item.has-work{border-left:3px solid var(--green)}
.day-item.selected{border-color:var(--blue);background:var(--blue-dim)}
.day-item.holiday.has-work{border-left:3px solid var(--green)}

.day-num{
  font-family:'DM Mono',monospace;
  font-size:17px;font-weight:500;
  min-width:26px;text-align:center;
  color:var(--text);
}
.day-item.weekend .day-num{color:var(--text2)}

.day-mid{flex:1}
.day-name{font-size:13px;color:var(--text2);margin-bottom:3px}
.badges{display:flex;gap:4px;flex-wrap:wrap}
.badge{
  font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px;
  letter-spacing:0.2px;text-transform:uppercase;
}
.b-holiday{background:var(--amber-dim);color:var(--amber)}
.b-wk{background:rgba(255,255,255,0.05);color:var(--text3)}
.b-work{background:var(--green-dim);color:var(--green)}

.day-right{text-align:right;min-width:55px}
.day-hrs{font-family:'DM Mono',monospace;font-size:14px;font-weight:500;color:var(--text)}
.day-pay{font-size:11px;color:var(--green);margin-top:1px}
.day-dash{font-size:18px;color:var(--text3)}

/* EDIT SHEET */
.sheet-backdrop{
  position:fixed;inset:0;background:rgba(0,0,0,0.6);
  z-index:200;display:none;
  backdrop-filter:blur(4px);
}
.sheet-backdrop.open{display:flex;align-items:flex-end}
.sheet{
  width:100%;max-width:480px;margin:0 auto;
  background:var(--surface);
  border-radius:20px 20px 0 0;
  border-top:1px solid var(--border2);
  padding:0 0 env(safe-area-inset-bottom,20px);
  transform:translateY(100%);
  transition:transform 0.3s cubic-bezier(0.32,0.72,0,1);
}
.sheet-backdrop.open .sheet{transform:translateY(0)}
.sheet-handle{
  width:36px;height:4px;border-radius:2px;
  background:var(--border2);margin:12px auto 0;
}
.sheet-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 20px 0;
}
.sheet-title{font-size:16px;font-weight:600}
.sheet-date{font-size:12px;color:var(--text2);margin-top:2px}
.sheet-close{
  width:30px;height:30px;border-radius:50%;
  background:var(--surface2);border:none;color:var(--text2);
  font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;
}
.sheet-body{padding:20px}
.time-row{
  display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;
}
.time-field label{font-size:11px;color:var(--text2);font-weight:500;text-transform:uppercase;letter-spacing:0.5px;display:block;margin-bottom:6px}
.time-field input[type=time]{
  width:100%;background:var(--bg);
  border:1px solid var(--border2);border-radius:var(--radius-sm);
  color:var(--text);font-family:'DM Mono',monospace;font-size:18px;font-weight:500;
  padding:12px;outline:none;
  -webkit-appearance:none;
}
.time-field input[type=time]:focus{border-color:var(--blue)}
.result-row{
  display:grid;grid-template-columns:1fr 1fr;gap:10px;
}
.result-box{
  background:var(--bg);border:1px solid var(--border);
  border-radius:var(--radius-sm);padding:14px;text-align:center;
}
.result-box .rl{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px}
.result-box .rv{font-family:'DM Mono',monospace;font-size:22px;font-weight:600}
.result-box.hrs .rv{color:var(--blue)}
.result-box.pay .rv{color:var(--green)}

.clear-btn{
  width:100%;margin-top:10px;padding:13px;
  background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);
  border-radius:var(--radius-sm);color:var(--red);
  font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;
}
.clear-btn:active{background:rgba(239,68,68,0.2)}

/* MONTH TOTAL BAR */
.month-bar{
  margin:14px 20px 0;
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius-sm);
  padding:10px 14px;
  display:flex;justify-content:space-between;align-items:center;
}
.month-bar span{font-size:12px;color:var(--text2)}
.month-bar strong{font-family:'DM Mono',monospace;font-size:13px;color:var(--text)}

/* YEAR OVERVIEW (bottom) */
.year-nav{
  position:fixed;bottom:0;left:0;right:0;
  max-width:480px;margin:0 auto;
  background:var(--bg);border-top:1px solid var(--border);
  padding:8px 16px env(safe-area-inset-bottom,8px);
  display:flex;gap:4px;overflow-x:auto;
  scrollbar-width:none;
}
.year-nav::-webkit-scrollbar{display:none}
.yr-btn{
  flex-shrink:0;padding:6px 10px;border-radius:8px;
  background:none;border:1px solid transparent;
  color:var(--text2);font-size:12px;font-weight:500;cursor:pointer;
  white-space:nowrap;transition:all 0.12s;
  font-family:'DM Sans',sans-serif;
}
.yr-btn.active{background:var(--surface2);border-color:var(--border2);color:var(--text)}
.yr-btn:active{transform:scale(0.95)}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1>📋 Πρόγραμμα 2026</h1>
    <p>Καταγραφή ωραρίου</p>
  </div>
  <div class="wage-pill">
    <label>€/ώρα</label>
    <input type="number" id="wageInput" value="5" min="0" step="0.5">
  </div>
</div>

<div class="month-nav">
  <button class="nav-btn" id="prevBtn">‹</button>
  <span class="month-label" id="monthLabel"></span>
  <button class="nav-btn" id="nextBtn">›</button>
</div>

<div class="summary" id="summary"></div>
<div class="month-bar" id="monthBar"></div>
<div class="days" id="daysList"></div>

<!-- YEAR NAV BAR -->
<div class="year-nav" id="yearNav"></div>

<!-- EDIT SHEET -->
<div class="sheet-backdrop" id="backdrop" onclick="closeSheet(event)">
  <div class="sheet" id="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <div>
        <div class="sheet-title" id="sheetTitle"></div>
        <div class="sheet-date" id="sheetDate"></div>
      </div>
      <button class="sheet-close" onclick="closeSheetDirect()">✕</button>
    </div>
    <div class="sheet-body">
      <div class="time-row">
        <div class="time-field">
          <label>Έναρξη</label>
          <input type="time" id="startTime" oninput="calcDay()">
        </div>
        <div class="time-field">
          <label>Λήξη</label>
          <input type="time" id="endTime" oninput="calcDay()">
        </div>
      </div>
      <div class="result-row">
        <div class="result-box hrs">
          <div class="rl">Ώρες</div>
          <div class="rv" id="hrsOut">—</div>
        </div>
        <div class="result-box pay">
          <div class="rl">Μεροκάματο</div>
          <div class="rv" id="payOut">—</div>
        </div>
      </div>
      <button class="clear-btn" onclick="clearDay()">🗑 Διαγραφή βάρδιας</button>
    </div>
  </div>
</div>

<script>
const MONTHS_SHORT=['Ιαν','Φεβ','Μαρ','Απρ','Μαι','Ιουν','Ιουλ','Αυγ','Σεπ','Οκτ','Νοε','Δεκ'];
const MONTHS_FULL=['Ιανουάριος','Φεβρουάριος','Μάρτιος','Απρίλιος','Μάιος','Ιούνιος','Ιούλιος','Αύγουστος','Σεπτέμβριος','Οκτώβριος','Νοέμβριος','Δεκέμβριος'];
const DAYS=['Κυρ','Δευ','Τρι','Τετ','Πεμ','Παρ','Σαβ'];
const DAYS_FULL=['Κυριακή','Δευτέρα','Τρίτη','Τετάρτη','Πέμπτη','Παρασκευή','Σάββατο'];
const HOLIDAYS={
  '2026-01-01':true,'2026-01-06':true,'2026-03-25':true,
  '2026-05-01':true,'2026-08-15':true,'2026-10-28':true,
  '2026-12-25':true,'2026-12-26':true
};

let curMonth=new Date().getMonth();
if(curMonth<0||curMonth>11) curMonth=0;
let editKey=null;
const data={};

function pad(n){return String(n).padStart(2,'0');}
function key(y,m,d){return `${y}-${pad(m+1)}-${pad(d)}`;}
function daysIn(m){return new Date(2026,m+1,0).getDate();}
function dow(d){return new Date(2026,curMonth,d).getDay();}
function isWknd(d){const w=dow(d);return w===0||w===6;}
function calcH(s,e){
  if(!s||!e)return 0;
  const[sh,sm]=s.split(':').map(Number);
  const[eh,em]=e.split(':').map(Number);
  const diff=(eh*60+em)-(sh*60+sm);
  return diff>0?Math.round(diff*100/60)/100:0;
}
function wage(){return parseFloat(document.getElementById('wageInput').value)||0;}

function getD(k){if(!data[k])data[k]={s:'',e:'',h:0};return data[k];}

function monthTotals(m){
  let hrs=0,pay=0,wdays=0;
  const w=wage();
  for(let d=1;d<=daysIn(m);d++){
    const k=key(2026,m,d);
    const h=(data[k]||{}).h||0;
    if(h>0){hrs+=h;pay+=h*w;wdays++;}
  }
  return{hrs,pay,wdays};
}

function yearTotal(){
  let hrs=0,pay=0;
  for(let m=0;m<12;m++){
    const t=monthTotals(m);hrs+=t.hrs;pay+=t.pay;
  }
  return{hrs,pay};
}

function render(){
  document.getElementById('monthLabel').textContent=MONTHS_FULL[curMonth];
  renderSummary();
  renderMonthBar();
  renderDays();
  renderYearNav();
}

function renderSummary(){
  const t=monthTotals(curMonth);
  document.getElementById('summary').innerHTML=`
    <div class="stat-card">
      <div class="label">Ώρες μήνα</div>
      <div class="value">${t.hrs.toFixed(1)}</div>
      <div class="sub">${t.wdays} εργάσιμες</div>
    </div>
    <div class="stat-card green">
      <div class="label">Αποδοχές</div>
      <div class="value">€${t.pay.toFixed(2)}</div>
      <div class="sub">@ €${wage().toFixed(2)}/ώρα</div>
    </div>`;
}

function renderMonthBar(){
  const yt=yearTotal();
  document.getElementById('monthBar').innerHTML=`
    <span>Σύνολο 2026</span>
    <strong>${yt.hrs.toFixed(1)}h &nbsp;·&nbsp; €${yt.pay.toFixed(2)}</strong>`;
}

function renderDays(){
  const days=daysIn(curMonth);
  const w=wage();
  let html='';
  for(let d=1;d<=days;d++){
    const k=key(2026,curMonth,d);
    const day=getD(k);
    const wknd=isWknd(d);
    const hol=HOLIDAYS[k];
    const hasWork=day.h>0;
    const sel=editKey===k;
    let cls='day-item';
    if(wknd)cls+=' weekend';
    if(hol)cls+=' holiday';
    if(hasWork)cls+=' has-work';
    if(sel)cls+=' selected';
    const dowIdx=dow(d);
    let badges='';
    if(hol)badges+=`<span class="badge b-holiday">Αργία</span>`;
    if(wknd&&!hol)badges+=`<span class="badge b-wk">Σ/Κ</span>`;
    if(hasWork)badges+=`<span class="badge b-work">${day.s}–${day.e}</span>`;
    const right=hasWork
      ?`<div class="day-hrs">${day.h.toFixed(1)}h</div><div class="day-pay">€${(day.h*w).toFixed(2)}</div>`
      :`<div class="day-dash">·</div>`;
    html+=`<div class="${cls}" onclick="openDay('${k}',${d})">
      <div class="day-num">${d}</div>
      <div class="day-mid">
        <div class="day-name">${DAYS_FULL[dowIdx]}</div>
        <div class="badges">${badges}</div>
      </div>
      <div class="day-right">${right}</div>
    </div>`;
  }
  document.getElementById('daysList').innerHTML=html;
}

function renderYearNav(){
  let html='';
  MONTHS_SHORT.forEach((mn,i)=>{
    const t=monthTotals(i);
    const dot=t.wdays>0?'•':' ';
    html+=`<button class="yr-btn${i===curMonth?' active':''}" onclick="goMonth(${i})">${mn}${t.wdays>0?' ·':''}</button>`;
  });
  document.getElementById('yearNav').innerHTML=html;
}

function goMonth(m){curMonth=m;editKey=null;closeSheetDirect();render();}

function openDay(k,d){
  editKey=k;
  const day=getD(k);
  const dowIdx=new Date(2026,curMonth,d).getDay();
  const hol=HOLIDAYS[k];
  document.getElementById('sheetTitle').textContent=`${d} ${MONTHS_FULL[curMonth]}`;
  document.getElementById('sheetDate').textContent=DAYS_FULL[dowIdx]+(hol?' · Αργία':'');
  document.getElementById('startTime').value=day.s||'';
  document.getElementById('endTime').value=day.e||'';
  updateSheetCalc(day.h);
  const bd=document.getElementById('backdrop');
  bd.style.display='flex';
  setTimeout(()=>bd.classList.add('open'),10);
  renderDays();
}

function calcDay(){
  const s=document.getElementById('startTime').value;
  const e=document.getElementById('endTime').value;
  const h=calcH(s,e);
  if(editKey){
    const day=getD(editKey);
    day.s=s;day.e=e;day.h=h;
  }
  updateSheetCalc(h);
  renderSummary();renderMonthBar();renderDays();renderYearNav();
}

function updateSheetCalc(h){
  const w=wage();
  document.getElementById('hrsOut').textContent=h>0?h.toFixed(1)+'h':'—';
  document.getElementById('payOut').textContent=h>0?'€'+(h*w).toFixed(2):'—';
}

function clearDay(){
  if(editKey&&data[editKey]){
    data[editKey]={s:'',e:'',h:0};
    document.getElementById('startTime').value='';
    document.getElementById('endTime').value='';
    updateSheetCalc(0);
    renderSummary();renderMonthBar();renderDays();renderYearNav();
  }
}

function closeSheet(e){
  if(e.target===document.getElementById('backdrop'))closeSheetDirect();
}
function closeSheetDirect(){
  const bd=document.getElementById('backdrop');
  bd.classList.remove('open');
  setTimeout(()=>{bd.style.display='none';},300);
  editKey=null;
  renderDays();
}

document.getElementById('prevBtn').onclick=()=>{if(curMonth>0){curMonth--;editKey=null;closeSheetDirect();render();}};
document.getElementById('nextBtn').onclick=()=>{if(curMonth<11){curMonth++;editKey=null;closeSheetDirect();render();}};
document.getElementById('wageInput').oninput=()=>{renderSummary();renderMonthBar();renderDays();};

// Start on current month or Jan
curMonth=Math.min(11,Math.max(0,new Date().getMonth()));
render();

// Scroll year nav to active
setTimeout(()=>{
  const nav=document.getElementById('yearNav');
  const active=nav.querySelector('.active');
  if(active)active.scrollIntoView({block:'nearest',inline:'center'});
},100);
</script>
</body>
</html>
